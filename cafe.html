<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Cafe Sample | Kurata Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    /* カフェサイト独自のスタイル */
    
    /* ヒーローエリアの調整 */
    .cafe-hero {
      position: relative;
      width: 100%;
      height: 70vh; /* 少し高さを出します */
      overflow: hidden;
    }

    .cafe-hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 画像を枠いっぱいに広げる */
      object-position: center; /* 中央を中心に表示 */
    }

    .cafe-hero-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 15px rgba(0,0,0,0.5); /* 文字を読みやすく */
      width: 90%;
      max-width: 800px;
    }

    .cafe-hero-content h1 {
      font-size: clamp(24px, 6vw, 48px);
      margin-bottom: 15px;
      line-height: 1.4;
    }

    /* 新設：コンセプトセクション */
    .concept-flex {
      display: flex;
      align-items: center;
      gap: 50px;
      margin-top: 50px;
    }

    .concept-img {
      width: 50%;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .concept-text {
      width: 50%;
    }

    /* メニューセクションの調整 */
    .menu-flex {
      display: flex;
      gap: 50px;
      margin-top: 50px;
      align-items: flex-start;
    }

    .menu-list {
      flex: 1; /* 残りのスペースを埋める */
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dotted #ccc;
      margin-bottom: 20px;
      padding-bottom: 10px;
      font-size: 18px;
    }

    .menu-price {
      font-weight: 700;
      color: #ff6868; /* ポートフォリオのアクセントカラーを使用 */
    }

    .menu-img {
      width: 40%;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* レスポンシブ対応（スマホ） */
    @media (max-width: 768px) {
      .concept-flex, .menu-flex {
        flex-direction: column; /* 縦並びにする */
        gap: 30px;
      }

      .concept-img, .concept-text, .menu-img, .menu-list {
        width: 100%;
      }
      
      .cafe-hero {
        height: 50vh;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="logo">CAFE DEMO</h1>
      <nav>
        <ul>
          <li><a href="index.html">Portfolioに戻る</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="cafe-hero">
    <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2000&auto=format&fit=crop" alt="カフェの店内" class="cafe-hero-img">
    <div class="cafe-hero-content">
      <h1>香り高い一杯と、<br>穏やかな時間を。</h1>
      <p>Organic Coffee & Homemade Sweets</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2>Concept</h2>
      <div class="concept-flex">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=1000&auto=format&fit=crop" alt="コーヒーを淹れる様子" class="concept-img">
        <div class="concept-text">
          <h3>こだわりの豆と、くつろぎの空間</h3>
          <p>当店では、世界中から厳選したオーガニック豆を自社焙煎し、一杯ずつ丁寧にハンドドリップで提供しています。</p>
          <p style="margin-top: 15px;">木の温かみを感じる店内で、日常の喧騒を忘れ、ゆったりとした時間をお過ごしください。</p>
        </div>
      </div>
    </div>
  </section>

  <section class="section bg-light">
    <div class="container">
      <h2>Menu</h2>
      <div class="menu-flex">
        <div class="menu-list">
          <div class="menu-item"><span>ブレンドコーヒー</span><span class="menu-price">¥500</span></div>
          <div class="menu-item"><span>カフェラテ</span><span class="menu-price">¥550</span></div>
          <div class="menu-item"><span>季節のタルト</span><span class="menu-price">¥600</span></div>
          <div class="menu-item"><span>自家製スコーン</span><span class="menu-price">¥450</span></div>
        </div>
        <img src="https://images.unsplash.com/photo-1586985289906-406988974504?q=80&w=1000&auto=format&fit=crop" alt="美味しそうなケーキ" class="menu-img">
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Cafe Demo / Created by Kurata</p>
  </footer>
</body>
</html>
