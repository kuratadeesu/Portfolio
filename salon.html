<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Hair Salon Sample | Kurata Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 美容室独自のスタイル */
    .salon-hero {
      height: 80vh;
      background: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)), 
                  url('https://images.unsplash.com/photo-1560066984-138dadb4c035?q=80&w=2000&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .salon-hero-content {
      background: rgba(255, 255, 255, 0.8);
      padding: 40px;
      text-align: center;
      border-radius: 2px;
    }
    .salon-hero h1 { color: #333; letter-spacing: 0.2em; }
    
    .price-list {
      max-width: 600px;
      margin: 0 auto;
    }
    .price-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 15px 0;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    .gallery-grid img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="logo">HAIR SALON</h1>
      <nav>
        <ul>
          <li><a href="index.html">Portfolioに戻る</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="salon-hero">
    <div class="salon-hero-content">
      <h1>BEAUTY & RESET</h1>
      <p>あなたらしい美しさを、引き出す場所。</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2 style="text-align:center; margin-bottom:40px;">Menu</h2>
      <div class="price-list">
        <div class="price-item"><span>Cut (S&B込)</span><span>¥5,500</span></div>
        <div class="price-item"><span>Color</span><span>¥6,600〜</span></div>
        <div class="price-item"><span>Perm</span><span>¥11,000〜</span></div>
      </div>
    </div>
  </section>

  <section class="section bg-light">
    <div class="container">
      <h2 style="text-align:center; margin-bottom:40px;">Style Gallery</h2>
      <div class="gallery-grid">
        <img src="https://images.unsplash.com/photo-1562322140-8baeececf3df?q=80&w=600&auto=format&fit=crop" alt="Style 1">
        <img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=600&auto=format&fit=crop" alt="Style 2">
        <img src="https://images.unsplash.com/photo-1559599101-f09722fb4948?q=80&w=600&auto=format&fit=crop" alt="Style 3">
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Hair Salon Demo / Created by Kurata</p>
  </footer>
</body>
</html>
